<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - FaceTrace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* Dark mode */
        [data-theme="dark"] {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: #2a2a3e;
            --card-bg: #0f0f1f;
            --navbar-bg: #0f0f1f;
            --dropdown-bg: #16213e;
        }

        body {
            background: #0f6c7a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .profile-container {
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .row-custom {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }

        .card-custom {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .card-custom:hover {
            transform: translateY(-5px);
        }

        .left-card {
            flex: 1;
            min-width: 280px;
        }

        .right-card {
            flex: 2;
            min-width: 380px;
        }

        .profile-img-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #0f6c7a;
            cursor: pointer;
        }

        .camera-icon {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: #0f6c7a;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            font-size: 12px;
            border: 2px solid white;
        }

        .menu-item {
            padding: 12px 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #555;
            margin-bottom: 5px;
        }

        .menu-item i {
            width: 24px;
            font-size: 18px;
        }

        .menu-item:hover {
            background: #f0f7f8;
            color: #0f6c7a;
            transform: translateX(5px);
        }

        .menu-item.active {
            background: #e6f3f5;
            color: #0f6c7a;
            font-weight: 500;
        }

        .menu-item.logout:hover {
            background: #fee;
            color: #dc3545;
        }

        .input-group-custom {
            margin-bottom: 20px;
        }

        .input-group-custom label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-box {
            width: 100%;
            padding: 10px 0;
            border: none;
            border-bottom: 2px solid #e0e0e0;
            font-size: 15px;
            transition: all 0.3s;
            background: transparent;
        }

        .input-box:focus {
            outline: none;
            border-bottom-color: #0f6c7a;
        }

        .btn-save {
            background: #0f6c7a;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 600;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .btn-save:hover {
            background: #0a555f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(15,108,122,0.3);
        }

        .divider {
            height: 1px;
            background: #e0e0e0;
            margin: 20px 0;
        }

        .notification-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #0f6c7a;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .hidden {
            display: none;
        }

        .alert-message {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .profile-container {
                padding: 20px;
            }
            .left-card, .right-card {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="row-custom">
            <!-- LEFT CARD - Profile Menu -->
            <div class="left-card card-custom">
                <div class="text-center">
                    <div class="profile-img-wrapper">
                        <img id="profileImage" src="https://ui-avatars.com/api/?background=0f6c7a&color=fff&size=100&name=U" 
                             class="profile-img" onclick="document.getElementById('avatarInput').click()">
                        <div class="camera-icon" onclick="document.getElementById('avatarInput').click()">
                            <i class="fas fa-camera"></i>
                        </div>
                        <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                    </div>
                    <h5 id="displayName" class="mt-2">User Name</h5>
                    <p class="text-muted" id="displayEmail">user@example.com</p>
                </div>

                <div class="divider"></div>

                <div class="menu-item active" onclick="showSection('profile')">
                    <i class="fas fa-user"></i> My Profile
                </div>
                <div class="menu-item" onclick="showSection('settings')">
                    <i class="fas fa-sliders-h"></i> Settings
                </div>
                <div class="menu-item" onclick="showSection('notifications')">
                    <i class="fas fa-bell"></i> Notifications
                </div>
                <div class="menu-item logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </div>
            </div>

            <!-- RIGHT CARD - Dynamic Content -->
            <div class="right-card card-custom">
                <!-- Profile Section -->
                <div id="profileSection">
                    <h5 class="mb-4">Edit Profile</h5>
                    <form id="profileForm">
                        <div class="input-group-custom">
                            <label>Name</label>
                            <input type="text" class="input-box" id="profileName" placeholder="Enter your name">
                        </div>
                        <div class="input-group-custom">
                            <label>Email</label>
                            <input type="email" class="input-box" id="profileEmail" placeholder="Enter your email">
                        </div>
                        <div class="input-group-custom">
                            <label>Mobile Number</label>
                            <input type="tel" class="input-box" id="profilePhone" placeholder="Add number">
                        </div>
                        <div class="input-group-custom">
                            <label>Location</label>
                            <input type="text" class="input-box" id="profileLocation" placeholder="Enter location">
                        </div>
                        <button type="submit" class="btn-save">Save Changes</button>
                    </form>
                </div>

                <!-- Settings Section -->
                <div id="settingsSection" class="hidden">
                    <h5 class="mb-4">Settings</h5>
                    <form id="settingsForm">
                        <div class="input-group-custom">
                            <label>Theme</label>
                            <select class="input-box" id="themeSelect">
                                <option value="light">Light</option>
                                <option value="dark">Dark</option>
                                <option value="auto">Auto</option>
                            </select>
                        </div>
                        <div class="input-group-custom">
                            <label>Language</label>
                            <select class="input-box" id="languageSelect">
                                <option value="en">English</option>
                                <option value="es">Spanish</option>
                                <option value="fr">French</option>
                                <option value="de">German</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-save">Save Settings</button>
                    </form>
                </div>

                <!-- Notifications Section -->
                <div id="notificationsSection" class="hidden">
                    <h5 class="mb-4">Notification Preferences</h5>
                    <div class="notification-item">
                        <span><i class="fas fa-envelope"></i> Email Notifications</span>
                        <label class="switch">
                            <input type="checkbox" id="emailNotify" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="notification-item">
                        <span><i class="fas fa-sms"></i> SMS Alerts</span>
                        <label class="switch">
                            <input type="checkbox" id="smsNotify">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="notification-item">
                        <span><i class="fas fa-chart-line"></i> Weekly Reports</span>
                        <label class="switch">
                            <input type="checkbox" id="weeklyReport" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="notification-item">
                        <span><i class="fas fa-tag"></i> Promotional Updates</span>
                        <label class="switch">
                            <input type="checkbox" id="promoUpdates">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <button class="btn-save" onclick="saveNotifications()">Save Preferences</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Registration Modal (First Time Users) -->
    <div id="registerModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
        <div style="background: white; max-width: 400px; width: 90%; border-radius: 20px; padding: 30px;">
            <h3 class="text-center mb-3">Welcome to FindIq</h3>
            <p class="text-center text-muted mb-4">Create your profile to get started</p>
            <form id="registerForm">
                <div class="input-group-custom">
                    <label>Full Name</label>
                    <input type="text" class="input-box" id="regName" required placeholder="Enter your name">
                </div>
                <div class="input-group-custom">
                    <label>Email Address</label>
                    <input type="email" class="input-box" id="regEmail" required placeholder="Enter your email">
                </div>
                <div class="input-group-custom">
                    <label>Mobile Number (Optional)</label>
                    <input type="tel" class="input-box" id="regPhone" placeholder="Add number">
                </div>
                <div class="input-group-custom">
                    <label>Location (Optional)</label>
                    <input type="text" class="input-box" id="regLocation" placeholder="Enter location">
                </div>
                <button type="submit" class="btn-save" style="width: 100%;">Get Started</button>
            </form>
        </div>
    </div>

    <script>
        // Check if user is registered
        let userData = JSON.parse(localStorage.getItem('userData'));

        if (!userData) {
            document.getElementById('registerModal').style.display = 'flex';
        } else {
            loadUserData();
        }

        // Handle registration
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            userData = {
                name: document.getElementById('regName').value,
                email: document.getElementById('regEmail').value,
                phone: document.getElementById('regPhone').value || 'Not set',
                location: document.getElementById('regLocation').value || 'Not set',
                avatar: null,
                theme: 'light',
                language: 'en',
                notifications: {
                    email: true,
                    sms: false,
                    weekly: true,
                    promo: false
                }
            };
            
            localStorage.setItem('userData', JSON.stringify(userData));
            document.getElementById('registerModal').style.display = 'none';
            loadUserData();
            showMessage('Profile created successfully!');
        });

        function loadUserData() {
            document.getElementById('displayName').textContent = userData.name;
            document.getElementById('displayEmail').textContent = userData.email;
            document.getElementById('profileName').value = userData.name;
            document.getElementById('profileEmail').value = userData.email;
            document.getElementById('profilePhone').value = userData.phone === 'Not set' ? '' : userData.phone;
            document.getElementById('profileLocation').value = userData.location === 'Not set' ? '' : userData.location;
            
            if (userData.avatar) {
                document.getElementById('profileImage').src = userData.avatar;
            } else {
                document.getElementById('profileImage').src = `https://ui-avatars.com/api/?background=0f6c7a&color=fff&size=100&name=${userData.name.charAt(0)}`;
            }
            
            // Load settings
            document.getElementById('themeSelect').value = userData.theme || 'light';
            document.getElementById('languageSelect').value = userData.language || 'en';
            
            // Load notifications
            if (userData.notifications) {
                document.getElementById('emailNotify').checked = userData.notifications.email;
                document.getElementById('smsNotify').checked = userData.notifications.sms;
                document.getElementById('weeklyReport').checked = userData.notifications.weekly;
                document.getElementById('promoUpdates').checked = userData.notifications.promo;
            }
        }

        // Profile form submit
        document.getElementById('profileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            userData.name = document.getElementById('profileName').value;
            userData.email = document.getElementById('profileEmail').value;
            userData.phone = document.getElementById('profilePhone').value || 'Not set';
            userData.location = document.getElementById('profileLocation').value || 'Not set';
            
            localStorage.setItem('userData', JSON.stringify(userData));
            document.getElementById('displayName').textContent = userData.name;
            document.getElementById('displayEmail').textContent = userData.email;
            
            if (!userData.avatar) {
                document.getElementById('profileImage').src = `https://ui-avatars.com/api/?background=0f6c7a&color=fff&size=100&name=${userData.name.charAt(0)}`;
            }
            
            showMessage('Profile updated successfully!');
        });

        // Settings form submit
        document.getElementById('settingsForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            userData.theme = document.getElementById('themeSelect').value;
            userData.language = document.getElementById('languageSelect').value;
            
            localStorage.setItem('userData', JSON.stringify(userData));
            showMessage('Settings saved!');
            
            if (userData.theme === 'dark') {
                document.body.style.background = '#1a1a2e';
            } else {
                document.body.style.background = '#0f6c7a';
            }
        });

        function saveNotifications() {
            userData.notifications = {
                email: document.getElementById('emailNotify').checked,
                sms: document.getElementById('smsNotify').checked,
                weekly: document.getElementById('weeklyReport').checked,
                promo: document.getElementById('promoUpdates').checked
            };
            
            localStorage.setItem('userData', JSON.stringify(userData));
            showMessage('Notification preferences saved!');
        }

        // Avatar upload
        document.getElementById('avatarInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    userData.avatar = event.target.result;
                    localStorage.setItem('userData', JSON.stringify(userData));
                    document.getElementById('profileImage').src = userData.avatar;
                    showMessage('Profile picture updated!');
                };
                reader.readAsDataURL(file);
            }
        });

        function showSection(section) {
            document.getElementById('profileSection').classList.add('hidden');
            document.getElementById('settingsSection').classList.add('hidden');
            document.getElementById('notificationsSection').classList.add('hidden');
            
            if (section === 'profile') {
                document.getElementById('profileSection').classList.remove('hidden');
            } else if (section === 'settings') {
                document.getElementById('settingsSection').classList.remove('hidden');
            } else if (section === 'notifications') {
                document.getElementById('notificationsSection').classList.remove('hidden');
            }
            
            // Update active menu
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.closest('.menu-item').classList.add('active');
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('userData');
                location.reload();
            }
        }

        function showMessage(message) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'alert-message';
            msgDiv.textContent = message;
            document.body.appendChild(msgDiv);
            setTimeout(() => msgDiv.remove(), 3000);
        }

        // Initialize default section
        showSection('profile');
    </script>
</body>
</html>
